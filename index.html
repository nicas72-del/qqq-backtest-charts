<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QQQ Signal — 오늘의 신호 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic',sans-serif;background:#0f172a;color:#e2e8f0;height:100vh;overflow:hidden}
.header{background:#1e293b;padding:12px 20px;border-bottom:1px solid #334155;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:17px;color:#a78bfa;font-weight:600}
.header h1 span{color:#64748b;font-size:12px;font-weight:400;margin-left:8px}
.regime-badge{font-size:11px;padding:3px 10px;border-radius:12px;font-weight:600}
.regime-Volatile{background:#451a03;color:#fbbf24}
.regime-Bull{background:#052e16;color:#34d399}
.regime-Sideways{background:#0c1a2e;color:#60a5fa}
.regime-Bear{background:#450a0a;color:#f87171}
.tabs{display:flex;background:#1e293b;border-bottom:1px solid #334155;padding:0 20px}
.tab{padding:10px 16px;font-size:13px;color:#64748b;cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:#a78bfa;border-bottom-color:#a78bfa}
.tab-cnt{background:#1e3a5f;color:#60a5fa;border-radius:8px;font-size:10px;font-weight:700;padding:1px 6px;margin-left:5px}
.tab.active .tab-cnt{background:#4c1d95;color:#c4b5fd}
.main{display:flex;height:calc(100vh - 88px)}
.sidebar{width:240px;min-width:240px;background:#1e293b;overflow-y:auto;border-right:1px solid #334155}
.sig-item{padding:8px 12px;border-bottom:1px solid #0f172a;cursor:pointer;transition:background 0.1s}
.sig-item:hover{background:#283447}
.sig-item.active{background:#1e3a8a}
.sig-name{font-size:12px;font-weight:700;color:#e2e8f0}
.sig-ticker{font-size:10px;color:#64748b;margin-top:1px}
.sig-meta{font-size:10px;color:#64748b;margin-top:3px}
.badges{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.badge{font-size:9px;padding:2px 6px;border-radius:6px;font-weight:700}
.badge-A{background:#1d4ed8;color:#fff}
.badge-B{background:#0e7490;color:#fff}
.badge-C{background:#6d28d9;color:#fff}
.badge-D{background:#065f46;color:#fff}
.badge-E{background:#9f1239;color:#fff}
.badge-multi{background:#7c3aed;color:#fff}
.chart-area{flex:1;display:flex;flex-direction:column;padding:12px;gap:10px;overflow:hidden;min-width:0}
.info-bar{background:#1e293b;border-radius:8px;padding:10px 14px}
.info-bar h2{font-size:14px;color:#e2e8f0;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.chips{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.chip{font-size:10px;background:#0f172a;border-radius:5px;padding:3px 8px;color:#94a3b8}
.chip span{color:#e2e8f0;font-weight:700}
.chip.tp span{color:#34d399}
.chip.sl span{color:#f87171}
.chart-wrap{background:#1e293b;border-radius:8px;padding:12px;flex:1;position:relative;min-height:0}
.pre-view{padding:16px;overflow-y:auto;height:100%}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:#1e293b;border-radius:8px;padding:12px 14px}
.stat-lbl{font-size:11px;color:#64748b;margin-bottom:4px}
.stat-val{font-size:22px;font-weight:700;color:#e2e8f0}
</style>
</head>
<body>
<div class="header">
  <h1>QQQ Signal <span id="updated-time"></span></h1>
  <span id="regime-badge" class="regime-badge" style="display:none"></span>
</div>
<div class="tabs">
  <div class="tab active" onclick="switchTab('e')" id="tab-e">전략E <span class="tab-cnt" id="cnt-e">0</span> <span id="tab-time-e" style="font-size:9px;color:#475569;margin-left:2px"></span></div>
  <div class="tab" onclick="switchTab('pre')" id="tab-pre">PRE <span class="tab-cnt" id="cnt-pre">0</span> <span id="tab-time-pre" style="font-size:9px;color:#475569;margin-left:2px"></span></div>
  <div class="tab" onclick="switchTab('final')" id="tab-final">FINAL <span class="tab-cnt" id="cnt-final">0</span> <span id="tab-time-final" style="font-size:9px;color:#475569;margin-left:2px"></span></div>
</div>
<div class="main" id="main-area">
  <div style="display:flex;align-items:center;justify-content:center;width:100%;color:#334155;font-size:13px">데이터 로딩 중...</div>
</div>
<script>
const GIST="https://gist.githubusercontent.com/nicas72-del/1310faba962a6f5b21c4ebf7d90991ef/raw/";
let allData={pre:null,mid:null,final:null,e:null};
let currentTab='pre',chart=null,filteredSigs=[];

async function loadData(){
  await Promise.all(['pre','mid','final','e'].map(async m=>{
    try{const r=await fetch(GIST+`signals_${m}.json?t=`+Date.now());if(r.ok)allData[m]=await r.json();}catch(e){}
  }));
  ['pre','mid','final','e'].forEach(m=>{
    const d=allData[m];
    document.getElementById('cnt-'+m).textContent=d?d.total:0;
    if(d&&d.date){
      const t=d.date.split(' ')[1];
      const el=document.getElementById('tab-time-'+m);
      if(el) el.textContent=t;
    }
  });
  // 헤더 시간은 현재 탭 기준으로 setRegime에서 처리
  document.getElementById('updated-time').textContent='';
  switchTab('e');
}

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  renderTab(tab);
}

function setRegime(d){
  const rb=document.getElementById('regime-badge');
  if(d&&d.regime&&d.regime!=='unknown'){
    const rm={Bull:'🚀 Bull',Sideways:'🟡 Sideways',Volatile:'⚡ Volatile',Bear:'🐻 Bear'};
    rb.textContent=rm[d.regime]||d.regime;
    rb.className='regime-badge regime-'+d.regime;
    rb.style.display='';
  }else{rb.style.display='none';}
  document.getElementById('updated-time').textContent=d&&d.date?d.date+' 기준':'';
}

function renderTab(tab){
  const d=allData[tab];
  if(chart){chart.destroy();chart=null;}
  if(!d){
    document.getElementById('main-area').innerHTML='<div style="display:flex;align-items:center;justify-content:center;width:100%;color:#334155;font-size:13px">아직 데이터가 없습니다</div>';
    return;
  }
  setRegime(d);
  if(tab==='pre'){renderPre(d);return;}
  const shown=new Set();
  filteredSigs=[];
  (d.multi_hit||[]).forEach(s=>{shown.add(s.ticker);filteredSigs.push({...s,_isMulti:true});});
  Object.entries(d.signals||{}).forEach(([st,sigs])=>{
    sigs.forEach(s=>{
      if(!shown.has(s.ticker)){shown.add(s.ticker);filteredSigs.push({...s,_strategy:st.replace('Strategy_',''),_isMulti:false});}
    });
  });
  if(!filteredSigs.length){
    document.getElementById('main-area').innerHTML='<div style="display:flex;align-items:center;justify-content:center;width:100%;color:#334155;font-size:13px">조건 충족 종목 없음</div>';
    return;
  }
  document.getElementById('main-area').innerHTML=`
    <div class="sidebar" id="sidebar"></div>
    <div class="chart-area">
      <div class="info-bar" id="info-bar"><h2 style="color:#334155">← 왼쪽에서 종목을 선택하세요</h2></div>
      <div class="chart-wrap"><canvas id="myChart"></canvas></div>
    </div>`;
  renderSidebar();
  if(filteredSigs.length===1)selectSignal(0);
}

function renderPre(d){
  const excl=d.excluded||{};
  const names=d.ticker_names||{};
  const tickers=d.pre_tickers||[];
  const rows=tickers.map(t=>`<div class="pre-item" onclick="showPreChart('${t}','${(names[t]||t).replace(/'/g,"\'")}')" style="display:flex;justify-content:space-between;align-items:center;padding:7px 12px;border-bottom:1px solid #0f172a;font-size:11px;cursor:pointer;transition:background 0.1s" onmouseover="this.style.background='#1e3a8a'" onmouseout="this.style.background=''">
    <span style="color:#e2e8f0;font-weight:600">${names[t]||t}</span>
    <span style="color:#64748b">${t}</span>
  </div>`).join('');
  document.getElementById('main-area').innerHTML=`
    <div style="display:flex;width:100%;height:100%;overflow:hidden">
      <div style="width:220px;min-width:220px;display:flex;flex-direction:column;border-right:1px solid #334155">
        <div style="padding:10px 12px;background:#1e293b;border-bottom:1px solid #334155">
          <div class="stat-grid" style="grid-template-columns:repeat(2,1fr);margin-bottom:8px">
            <div class="stat-card" style="padding:8px 10px"><div class="stat-lbl">PRE 후보</div><div class="stat-val" style="color:#60a5fa;font-size:16px">${d.total}</div></div>
            <div class="stat-card" style="padding:8px 10px"><div class="stat-lbl">월봉 제외</div><div class="stat-val" style="color:#f87171;font-size:16px">${excl.monthly||0}</div></div>
          </div>
          <input id="pre-search" type="text" placeholder="종목명/티커 검색..." onkeyup="filterPre()" style="width:100%;background:#0f172a;color:#e2e8f0;border:1px solid #334155;border-radius:6px;padding:5px 10px;font-size:11px">
        </div>
        <div id="pre-list" style="overflow-y:auto;flex:1">${rows}</div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center" id="pre-chart-area">
        <div style="color:#334155;font-size:13px">← 종목을 선택하면 차트가 표시됩니다</div>
      </div>
    </div>`;
  window._preData = {names, tickers};
}

function showPreChart(ticker, name) {
  document.querySelectorAll('.pre-item').forEach(e=>e.style.background='');
  event.currentTarget.style.background='#1e3a8a';
  const area = document.getElementById('pre-chart-area');
  const exchange = ticker.startsWith('0') ? 'KRX' : 'KOSDAQ';
  area.innerHTML = `
    <div style="width:100%;padding:8px 12px;background:#1e293b;border-bottom:1px solid #334155;font-size:12px;color:#e2e8f0;font-weight:600">
      ${name} <span style="color:#64748b;font-weight:400">(${ticker})</span>
    </div>
    <iframe src="https://www.tradingview.com/widgetembed/?symbol=KRX:${ticker}&interval=W&theme=dark&style=1&locale=kr&hide_top_toolbar=0&save_image=0&allow_symbol_change=0"
      style="width:100%;flex:1;border:none" frameborder="0" allowtransparency="true" scrolling="no"></iframe>`;
  area.style.flexDirection='column';
  area.style.alignItems='stretch';
  area.style.justifyContent='flex-start';
}

function filterPre(){
  const q=document.getElementById('pre-search').value.toLowerCase();
  const {names,tickers}=window._preData||{};
  if(!tickers)return;
  const filtered=tickers.filter(t=>!q||(names[t]||t).toLowerCase().includes(q)||t.includes(q));
  document.getElementById('pre-list').innerHTML=filtered.map(t=>`<div class="pre-item" onclick="showPreChart('${t}','${(names[t]||t).replace(/'/g,"\'")}')" style="display:flex;justify-content:space-between;align-items:center;padding:7px 12px;border-bottom:1px solid #0f172a;font-size:11px;cursor:pointer;transition:background 0.1s" onmouseover="this.style.background='#1e3a8a'" onmouseout="this.style.background=''">
    <span style="color:#e2e8f0;font-weight:600">${names[t]||t}</span>
    <span style="color:#64748b">${t}</span>
  </div>`).join('');
}

function renderSidebar(){
  const sb=document.getElementById('sidebar');
  if(!sb)return;
  sb.innerHTML=filteredSigs.map((s,i)=>{
    const strats=s._isMulti
      ?s.strategies.map(st=>`<span class="badge badge-${st.replace('Strategy_','')}">${st.replace('Strategy_','')}</span>`).join('')+'<span class="badge badge-multi">멀티</span>'
      :`<span class="badge badge-${s._strategy||'A'}">${s._strategy||'A'}</span>`;
    return `<div class="sig-item" onclick="selectSignal(${i})" id="item-${i}">
      <div class="sig-name">${s.name}</div>
      <div class="sig-ticker">${s.ticker}</div>
      <div class="badges">${strats}</div>
      <div class="sig-meta">현재 ${s.curr} | RR ${s.rr}</div>
    </div>`;
  }).join('');
}

function selectSignal(idx){
  document.querySelectorAll('.sig-item').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('item-'+idx);
  if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const s=filteredSigs[idx];
  const strats=s._isMulti
    ?s.strategies.map(st=>`<span class="badge badge-${st.replace('Strategy_','')}">${st.replace('Strategy_','')}</span>`).join('')+'<span class="badge badge-multi">멀티</span>'
    :`<span class="badge badge-${s._strategy||'A'}">${s._strategy||'A'}</span>`;
  document.getElementById('info-bar').innerHTML=`
    <h2>${s.name} <span style="color:#64748b;font-size:12px;font-weight:400">(${s.ticker})</span> ${strats}</h2>
    <div class="chips">
      <div class="chip">현재가 <span>${s.curr}</span></div>
      <div class="chip tp">목표가 <span>${s.tp}</span></div>
      <div class="chip sl">손절가 <span>${s.sl||'WMA60'}</span></div>
      <div class="chip">RR <span>${s.rr}</span></div>
      <div class="chip">거래대금 <span>${s.avg_vol_amt}억</span></div>
    </div>`;
  if(s.chart)drawChart(s);
}

function drawChart(s){
  const c=s.chart;
  const BEFORE=c.entry_bar;
  const prices=c.prices,w60=c.wma60,w120=c.wma120,n=prices.length;
  const ep=prices[BEFORE];
  if(!ep)return;
  const toRet=v=>v!=null?+((v/ep-1)*100).toFixed(2):null;
  const pnl=prices.map(toRet);
  const w60p=w60?w60.map(toRet):null;
  const w120p=w120?w120.map(toRet):null;
  const slVal=s.sl?parseFloat(s.sl.replace(/,/g,'')):null;
  const tpVal=s.tp?parseFloat(s.tp.replace(/,/g,'')):null;
  const slPct=slVal?toRet(slVal):null;
  const tpPct=tpVal?toRet(tpVal):null;
  const strats=s._isMulti?(s.strategies||[]).map(st=>st.replace('Strategy_','')):[s._strategy||'A'];
  const isAB=strats.some(st=>['A','B'].includes(st));
  const isE=strats.includes('E');
  const ds=[
    {label:'주가(%)',data:pnl,borderColor:'#4fc3f7',backgroundColor:'#4fc3f722',borderWidth:2,pointRadius:0,fill:true,tension:0.1,order:1},
  ];
  if(w60p)ds.push({label:'WMA60(%)',data:w60p,borderColor:'#f59e0b',borderWidth:1.5,pointRadius:0,fill:false,tension:0.1,order:2});
  if(w120p&&!isE)ds.push({label:'WMA120(%)',data:w120p,borderColor:'#a78bfa',borderWidth:1.5,pointRadius:0,fill:false,tension:0.1,order:3});
  ds.push({label:'진입(0%)',data:Array(n).fill(0),borderColor:'#64748b',borderWidth:1,borderDash:[3,3],pointRadius:0,fill:false,order:4});
  if(tpPct!=null)ds.push({label:'TP',data:Array(n).fill(tpPct),borderColor:'#34d399',borderWidth:1,borderDash:[4,4],pointRadius:0,fill:false,order:5});
  if(slPct!=null)ds.push({label:'SL',data:Array(n).fill(slPct),borderColor:'#f87171',borderWidth:1,borderDash:[4,4],pointRadius:0,fill:false,order:6});
  const ep2=Array(n).fill(null);ep2[BEFORE]=pnl[BEFORE];
  ds.push({label:'진입',data:ep2,borderColor:'#4fc3f7',backgroundColor:'#4fc3f7',pointRadius:7,pointStyle:'triangle',showLine:false,order:0});
  if(chart)chart.destroy();
  const ctx=document.getElementById('myChart').getContext('2d');
  chart=new Chart(ctx,{
    type:'line',data:{labels:c.dates,datasets:ds},
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{labels:{color:'#94a3b8',font:{size:10},boxWidth:20}},
        tooltip:{callbacks:{label:ctx=>ctx.raw!=null?ctx.dataset.label+': '+ctx.raw.toFixed(2)+'%':null}},
        annotation:{annotations:{
          entryLine:{type:'line',xMin:BEFORE,xMax:BEFORE,borderColor:'#4fc3f7',borderWidth:2,borderDash:[6,3],
            label:{content:'▶ 진입',display:true,position:'start',color:'#4fc3f7',font:{size:10,weight:'bold'},backgroundColor:'rgba(15,23,42,0.8)',padding:3}},
          beforeShade:{type:'box',xMin:0,xMax:BEFORE,backgroundColor:'rgba(239,68,68,0.05)',borderWidth:0,
            label:{content:isAB?'42봉 조정구간':isE?'30봉 WMA60 아래':'30봉 조정구간',display:true,position:{x:'center',y:'end'},color:'#f87171',font:{size:9},backgroundColor:'transparent'}},
          afterShade:{type:'box',xMin:BEFORE,xMax:n-1,backgroundColor:'rgba(79,195,247,0.04)',borderWidth:0}
        }}
      },
      scales:{
        x:{ticks:{color:'#64748b',font:{size:9},maxTicksLimit:16},grid:{color:'#1e293b'}},
        y:{ticks:{color:'#64748b',font:{size:10},callback:v=>v.toFixed(1)+'%'},grid:{color:'#334155'}}
      }
    }
  });
}
loadData();
</script>
</body>
</html>
