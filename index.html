<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>QQQ 백테스트 · 신호 종목 차트</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Malgun Gothic', sans-serif; background: #0f172a; color: #e2e8f0; height: 100vh; overflow: hidden; }
.header { background: #1e293b; padding: 14px 24px; border-bottom: 1px solid #334155; display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 18px; color: #4fc3f7; }
.header p { font-size: 11px; color: #64748b; margin-top: 2px; }
.controls { display: flex; gap: 10px; padding: 10px 24px; background: #1e293b; flex-wrap: wrap; align-items: center; border-bottom: 1px solid #334155; }
.controls label { font-size: 11px; color: #94a3b8; display: block; margin-bottom: 3px; }
select, input[type=text] { background: #0f172a; color: #e2e8f0; border: 1px solid #334155; border-radius: 6px; padding: 5px 8px; font-size: 12px; }
.btn-group { display: flex; gap: 4px; }
.btn { background: #1e293b; color: #94a3b8; border: 1px solid #334155; border-radius: 6px; padding: 5px 12px; cursor: pointer; font-size: 12px; transition: all 0.15s; }
.btn:hover { background: #334155; color: #e2e8f0; }
.btn.active { background: #1d4ed8; color: white; border-color: #1d4ed8; }
.count { font-size: 13px; font-weight: bold; color: #4fc3f7; }
.main { display: flex; height: calc(100vh - 110px); }
.sidebar { width: 260px; min-width: 260px; background: #1e293b; overflow-y: auto; border-right: 1px solid #334155; }
.sig-item { padding: 8px 12px; border-bottom: 1px solid #0f172a; cursor: pointer; transition: background 0.12s; }
.sig-item:hover { background: #283447; }
.sig-item.active { background: #1e3a8a; }
.sig-top { display: flex; justify-content: space-between; align-items: center; }
.sig-name { font-size: 12px; font-weight: bold; color: #e2e8f0; }
.sig-code { font-size: 10px; color: #64748b; margin-top: 1px; }
.sig-meta { font-size: 10px; color: #64748b; margin-top: 2px; }
.sig-pnl { font-size: 11px; font-weight: bold; margin-top: 2px; }
.badge { font-size: 9px; padding: 2px 6px; border-radius: 8px; font-weight: bold; white-space: nowrap; }
.badge-A { background: #1d4ed8; color: white; }
.badge-B { background: #0e7490; color: white; }
.badge-C { background: #7c3aed; color: white; }
.badge-D { background: #065f46; color: white; }
.pos { color: #34d399; }
.neg { color: #f87171; }
.chart-area { flex: 1; display: flex; flex-direction: column; padding: 12px; gap: 10px; overflow: hidden; }
.info-bar { background: #1e293b; border-radius: 8px; padding: 10px 16px; }
.info-bar h2 { font-size: 15px; color: #e2e8f0; display: flex; align-items: center; gap: 10px; }
.info-bar h2 .code { font-size: 12px; color: #64748b; font-weight: normal; }
.chips { display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
.chip { font-size: 10px; background: #0f172a; border-radius: 5px; padding: 3px 8px; color: #94a3b8; }
.chip span { color: #e2e8f0; font-weight: bold; }
.result-chip { font-size: 11px; padding: 3px 10px; border-radius: 5px; font-weight: bold; }
.r-TP { background: #064e3b; color: #34d399; }
.r-SL { background: #450a0a; color: #f87171; }
.r-HOLD { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
.chart-wrap { background: #1e293b; border-radius: 8px; padding: 12px; flex: 1; position: relative; min-height: 0; }
.empty { display: flex; align-items: center; justify-content: center; height: 100%; color: #64748b; font-size: 13px; }
.stat-row { display: flex; gap: 8px; }
.stat { background: #1e293b; border-radius: 8px; padding: 8px 14px; flex: 1; }
.stat .lbl { font-size: 10px; color: #64748b; }
.stat .val { font-size: 16px; font-weight: bold; margin-top: 2px; }
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>📊 QQQ 백테스트 · 신호 종목 주가 차트</h1>
    <p>backtest_v13 · 전략 A/B/C/D · WMA60/WMA120 이평선 포함</p>
  </div>
  <div class="count" id="countDisplay">-</div>
</div>
<div class="controls">
  <div>
    <label>전략</label>
    <div class="btn-group">
      <button class="btn active" onclick="setStrat('ALL',this)">전체</button>
      <button class="btn" onclick="setStrat('A',this)">A</button>
      <button class="btn" onclick="setStrat('B',this)">B</button>
      <button class="btn" onclick="setStrat('C',this)">C</button>
      <button class="btn" onclick="setStrat('D',this)">D</button>
    </div>
  </div>
  <div>
    <label>국면</label>
    <select id="regSel" onchange="applyFilter()">
      <option value="ALL">전체</option>
      <option value="Bull">🚀 Bull</option>
      <option value="Sideways">🟡 Sideways</option>
      <option value="Volatile">⚡ Volatile</option>
    </select>
  </div>
  <div>
    <label>결과</label>
    <select id="resSel" onchange="applyFilter()">
      <option value="ALL">전체</option>
      <option value="TP">✅ 익절</option>
      <option value="SL">❌ 손절</option>
      <option value="HOLD">⏳ 보유</option>
    </select>
  </div>
  <div>
    <label>종목 검색</label>
    <input type="text" id="searchIn" placeholder="종목명 또는 코드" oninput="applyFilter()" style="width:150px">
  </div>
</div>
<div class="main">
  <div class="sidebar" id="sidebar"><div class="empty" style="height:100px">로딩 중...</div></div>
  <div class="chart-area">
    <div class="stat-row" id="statRow"></div>
    <div class="info-bar" id="infoBar"><div class="empty">← 왼쪽에서 종목을 선택하세요</div></div>
    <div class="chart-wrap"><canvas id="myChart"></canvas></div>
  </div>
</div>

<script>
let ALL = [];
let filtered = [];
let curStrat = 'ALL';
let chart = null;

// signals_full.json 로드
fetch('signals_full.json')
  .then(r => r.json())
  .then(data => {
    ALL = data;
    renderStats();
    applyFilter();
  });

function setStrat(s, btn) {
  curStrat = s;
  document.querySelectorAll('.btn-group .btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter();
}

function applyFilter() {
  const reg = document.getElementById('regSel').value;
  const res = document.getElementById('resSel').value;
  const q   = document.getElementById('searchIn').value.toLowerCase();
  filtered = ALL.filter(s => {
    if (curStrat !== 'ALL' && s.strategy !== curStrat) return false;
    if (reg !== 'ALL' && s.regime !== reg) return false;
    if (res !== 'ALL' && s.result !== res) return false;
    if (q && !s.name.toLowerCase().includes(q) && !s.ticker.includes(q)) return false;
    return true;
  });
  document.getElementById('countDisplay').textContent = filtered.length + '건';
  renderSidebar();
}

function renderStats() {
  const wins = ALL.filter(s => s.pnl > 0).length;
  const wr   = (wins / ALL.length * 100).toFixed(1);
  const valid = ALL.filter(s => !isNaN(s.pnl));
  const avg  = valid.length ? (valid.reduce((a,s) => a+s.pnl,0)/valid.length).toFixed(2) : '0.00';
  const tp   = ALL.filter(s => s.result==='TP').length;
  const sl   = ALL.filter(s => s.result==='SL').length;
  document.getElementById('statRow').innerHTML = `
    <div class="stat"><div class="lbl">총 신호수</div><div class="val" style="color:#4fc3f7">${ALL.length}건</div></div>
    <div class="stat"><div class="lbl">승률</div><div class="val" style="color:#34d399">${wr}%</div></div>
    <div class="stat"><div class="lbl">평균수익</div><div class="val" style="color:${avg>=0?'#34d399':'#f87171'}">${avg>=0?'+':''}${avg}%</div></div>
    <div class="stat"><div class="lbl">익절/손절</div><div class="val">${tp}건 / ${sl}건</div></div>
  `;
}

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  if (!filtered.length) { sb.innerHTML = '<div class="empty" style="height:80px;padding:20px">조건에 맞는 신호 없음</div>'; return; }
  sb.innerHTML = filtered.map((s,i) => {
    const pc = s.pnl >= 0 ? 'pos' : 'neg';
    const ps = (s.pnl>=0?'+':'') + s.pnl.toFixed(2) + '%';
    return `<div class="sig-item" onclick="selectSignal(${i})" id="item-${i}">
      <div class="sig-top">
        <div>
          <div class="sig-name">${s.name}</div>
          <div class="sig-code">${s.ticker}</div>
        </div>
        <span class="badge badge-${s.strategy}">전략${s.strategy}</span>
      </div>
      <div class="sig-meta">${s.entry_date} · ${s.regime}</div>
      <div class="sig-pnl ${pc}">${ps} <span style="color:#64748b;font-size:9px">(${s.result})</span></div>
    </div>`;
  }).join('');
}

function selectSignal(idx) {
  document.querySelectorAll('.sig-item').forEach(e => e.classList.remove('active'));
  const el = document.getElementById('item-'+idx);
  if (el) { el.classList.add('active'); el.scrollIntoView({block:'nearest'}); }

  const s = filtered[idx];
  const pc = s.pnl >= 0 ? 'pos' : 'neg';
  const ps = (s.pnl>=0?'+':'') + s.pnl.toFixed(2) + '%';
  const rc = s.result==='TP' ? 'r-TP' : s.result==='SL' ? 'r-SL' : 'r-HOLD';
  const rl = s.result==='TP' ? '✅ 익절' : s.result==='SL' ? '❌ 손절' : '⏳ 보유';

  document.getElementById('infoBar').innerHTML = `
    <h2>${s.name} <span class="code">(${s.ticker})</span>
      <span class="result-chip ${rc}">${rl}</span>
      <span class="sig-pnl ${pc}" style="font-size:13px">${ps}</span>
    </h2>
    <div class="chips">
      <div class="chip">전략 <span>${s.strategy} (${s.type})</span></div>
      <div class="chip">진입일 <span>${s.entry_date}</span></div>
      <div class="chip">진입가 <span>${s.entry_price.toLocaleString()}원</span></div>
      <div class="chip">국면 <span>${s.regime}</span></div>
      <div class="chip">손절가 <span>${s.sl ? s.sl.toLocaleString()+'원' : 'N/A'}</span></div>
      <div class="chip">TP+3% <span>${s.tp3.toLocaleString()}원</span></div>
    </div>`;

  drawChart(s);
}

function drawChart(s) {
  const BEFORE = s.before || 30;
  const prices = s.prices;
  const w60    = s.wma60;
  const w120   = s.wma120;
  const n = prices.length;

  // X축 레이블: 진입 기준 상대 봉수
  const labels = prices.map((_,i) => {
    const rel = i - BEFORE;
    if (rel === 0) return '▶진입';
    return rel > 0 ? '+'+rel : String(rel);
  });

  // 가격 → 수익률(%) 변환
  const ep = s.entry_price;
  const pnlSeries  = prices.map(p => +((p/ep-1)*100).toFixed(2));
  const w60pnl     = w60  ? w60.map(p  => p  !== null ? +((p /ep-1)*100).toFixed(2) : null) : null;
  const w120pnl    = w120 ? w120.map(p => p  !== null ? +((p /ep-1)*100).toFixed(2) : null) : null;
  const slPct      = s.sl ? +((s.sl/ep-1)*100).toFixed(2) : null;
  const tp3Pct     = +((s.tp3/ep-1)*100).toFixed(2);

  const datasets = [
    {
      label: '주가(%)',
      data: pnlSeries,
      borderColor: '#4fc3f7',
      backgroundColor: '#4fc3f722',
      borderWidth: 2,
      pointRadius: 0,
      fill: true,
      tension: 0.1,
      order: 1,
    },
  ];

  if (w60pnl) datasets.push({
    label: 'WMA60(%)',
    data: w60pnl,
    borderColor: '#f59e0b',
    borderWidth: 1.5,
    pointRadius: 0,
    fill: false,
    tension: 0.1,
    order: 2,
  });

  if (w120pnl) datasets.push({
    label: 'WMA120(%)',
    data: w120pnl,
    borderColor: '#a78bfa',
    borderWidth: 1.5,
    pointRadius: 0,
    fill: false,
    tension: 0.1,
    order: 3,
  });

  // 진입선
  datasets.push({ label: '진입(0%)', data: Array(n).fill(0), borderColor: '#64748b', borderWidth: 1, borderDash: [3,3], pointRadius: 0, fill: false, order: 4 });
  // TP선
  datasets.push({ label: 'TP+3%', data: Array(n).fill(tp3Pct), borderColor: '#34d399', borderWidth: 1, borderDash: [4,4], pointRadius: 0, fill: false, order: 5 });
  // SL선
  if (slPct !== null) datasets.push({ label: '손절', data: Array(n).fill(slPct), borderColor: '#f87171', borderWidth: 1, borderDash: [4,4], pointRadius: 0, fill: false, order: 6 });

  // 진입 수직선 (annotation 대신 특수 포인트)
  const entryPoint = Array(n).fill(null);
  entryPoint[BEFORE] = pnlSeries[BEFORE];
  datasets.push({ label: '진입점', data: entryPoint, borderColor: '#4fc3f7', backgroundColor: '#4fc3f7', pointRadius: 6, pointStyle: 'triangle', showLine: false, order: 0 });

  // 청산점
  if (s.exit_bar < n) {
    const exitPoint = Array(n).fill(null);
    exitPoint[s.exit_bar] = pnlSeries[s.exit_bar];
    const exitColor = s.result==='TP' ? '#34d399' : s.result==='SL' ? '#f87171' : '#94a3b8';
    datasets.push({ label: '청산점', data: exitPoint, borderColor: exitColor, backgroundColor: exitColor, pointRadius: 8, pointStyle: 'star', showLine: false, order: 0 });
  }

  if (chart) chart.destroy();
  const ctx = document.getElementById('myChart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          labels: { color: '#94a3b8', font: { size: 10 }, boxWidth: 20 }
        },
        tooltip: {
          callbacks: {
            label: ctx => {
              if (ctx.raw === null) return null;
              return ctx.dataset.label + ': ' + (typeof ctx.raw === 'number' ? ctx.raw.toFixed(2)+'%' : ctx.raw);
            }
          }
        }
      },
      scales: {
        x: {
          ticks: { color: '#64748b', font: { size: 10 }, maxTicksLimit: 20 },
          grid: { color: '#1e293b' }
        },
        y: {
          ticks: { color: '#64748b', font: { size: 10 }, callback: v => v.toFixed(1)+'%' },
          grid: { color: '#334155' }
        }
      }
    }
  });
}

applyFilter();
</script>
</body>
</html>
