<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QQQ Signal — 오늘의 신호 대시보드</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh}
header{background:#fff;border-bottom:0.5px solid #e0e0dc;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
.logo{font-size:17px;font-weight:600;letter-spacing:-0.3px}
.logo span{color:#534AB7}
.regime-badge{font-size:12px;padding:4px 10px;border-radius:20px;font-weight:500}
.regime-Volatile{background:#FAEEDA;color:#854F0B}
.regime-Bull{background:#EAF3DE;color:#3B6D11}
.regime-Sideways{background:#E6F1FB;color:#185FA5}
.regime-Bear{background:#FCEBEB;color:#A32D2D}
.updated{font-size:12px;color:#888;margin-left:10px}
.tabs{display:flex;background:#fff;border-bottom:0.5px solid #e0e0dc;padding:0 24px}
.tab{padding:12px 20px;font-size:14px;font-weight:500;color:#888;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s}
.tab.active{color:#534AB7;border-bottom-color:#534AB7}
.tab-count{display:inline-flex;align-items:center;justify-content:center;background:#EEEDFE;color:#534AB7;border-radius:10px;font-size:11px;font-weight:600;padding:1px 7px;margin-left:6px}
.tab.active .tab-count{background:#534AB7;color:#fff}
main{padding:24px;max-width:900px;margin:0 auto}
.section-meta{font-size:13px;color:#888;margin-bottom:16px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.card{background:#fff;border:0.5px solid #e0e0dc;border-radius:12px;padding:16px 18px;cursor:pointer;transition:border-color 0.15s}
.card:hover{border-color:#AFA9EC}
.card.multi{border-left:3px solid #534AB7}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.card-name{font-size:15px;font-weight:500}
.card-ticker{font-size:12px;color:#888;margin-top:2px}
.badges{display:flex;gap:5px;flex-wrap:wrap}
.badge{font-size:11px;padding:3px 8px;border-radius:6px;font-weight:500}
.badge-A{background:#E6F1FB;color:#185FA5}
.badge-B{background:#EAF3DE;color:#3B6D11}
.badge-C{background:#EEEDFE;color:#534AB7}
.badge-D{background:#FAEEDA;color:#854F0B}
.badge-E{background:#FCEBEB;color:#A32D2D}
.badge-multi{background:#534AB7;color:#fff}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.metric{background:#f5f5f3;border-radius:8px;padding:8px 10px}
.metric-label{font-size:11px;color:#888;margin-bottom:3px}
.metric-value{font-size:14px;font-weight:500}
.metric-value.tp{color:#3B6D11}
.metric-value.sl{color:#A32D2D}
.metric-rr{font-size:12px;color:#888;margin-top:8px}
.chart-link{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:#534AB7;margin-top:10px;text-decoration:none}
.chart-link:hover{text-decoration:underline}
.empty{text-align:center;padding:60px 0;color:#aaa;font-size:14px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px;margin-bottom:20px}
.stat{background:#fff;border:0.5px solid #e0e0dc;border-radius:10px;padding:12px 14px}
.stat-label{font-size:11px;color:#888;margin-bottom:4px}
.stat-value{font-size:20px;font-weight:500}
.no-data{text-align:center;padding:80px 0;color:#aaa}
.no-data p{font-size:14px;margin-top:8px}
.loading{text-align:center;padding:80px 0;color:#aaa;font-size:14px}
</style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center;gap:12px">
    <div class="logo">QQQ <span>Signal</span></div>
    <span class="updated" id="updated-time"></span>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <span id="regime-badge" class="regime-badge" style="display:none"></span>
  </div>
</header>
<div class="tabs">
  <div class="tab active" onclick="switchTab('pre')" id="tab-pre">PRE <span class="tab-count" id="cnt-pre">0</span></div>
  <div class="tab" onclick="switchTab('mid')" id="tab-mid">MID <span class="tab-count" id="cnt-mid">0</span></div>
  <div class="tab" onclick="switchTab('final')" id="tab-final">FINAL <span class="tab-count" id="cnt-final">0</span></div>
</div>
<main>
  <div id="content"><div class="loading">데이터 로딩 중...</div></div>
</main>
<script>
const GIST_BASE="https://gist.githubusercontent.com/nicas72-del/1310faba962a6f5b21c4ebf7d90991ef/raw/";
let allData={pre:null,mid:null,final:null};
let currentTab='pre';
async function loadData(){
  const files=[{key:'pre',url:GIST_BASE+'signals_pre.json'},{key:'mid',url:GIST_BASE+'signals_mid.json'},{key:'final',url:GIST_BASE+'signals_final.json'}];
  await Promise.all(files.map(async({key,url})=>{
    try{const r=await fetch(url+'?t='+Date.now());if(r.ok)allData[key]=await r.json();}catch(e){}
  }));
  updateTabCounts();renderTab(currentTab);
}
function updateTabCounts(){
  ['pre','mid','final'].forEach(k=>{
    const d=allData[k];
    document.getElementById('cnt-'+k).textContent=d?d.total:0;
  });
}
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  renderTab(tab);
}
function renderTab(tab){
  const d=allData[tab];
  const content=document.getElementById('content');
  if(!d){content.innerHTML='<div class="no-data"><div style="font-size:32px">—</div><p>아직 데이터가 없습니다</p></div>';return;}
  document.getElementById('updated-time').textContent=d.date?d.date+' 기준':'';
  const rb=document.getElementById('regime-badge');
  if(d.regime&&d.regime!=='unknown'){
    rb.style.display='';
    const rm={Bull:'🚀 Bull',Sideways:'🟡 Sideways',Volatile:'⚡ Volatile',Bear:'🐻 Bear'};
    rb.textContent=rm[d.regime]||d.regime;rb.className='regime-badge regime-'+d.regime;
  }else{rb.style.display='none';}
  if(tab==='pre')renderPre(d,content);else renderSignals(d,content);
}
function renderPre(d,content){
  const excl=d.excluded||{};
  content.innerHTML=`<div class="section-meta">${d.collection||''}</div>
  <div class="stats">
    <div class="stat"><div class="stat-label">PRE 후보</div><div class="stat-value">${d.total}</div></div>
    <div class="stat"><div class="stat-label">월봉 제외</div><div class="stat-value" style="color:#A32D2D">${excl.monthly||0}</div></div>
    <div class="stat"><div class="stat-label">거래대금 제외</div><div class="stat-value" style="color:#A32D2D">${excl.volume||0}</div></div>
    <div class="stat"><div class="stat-label">패턴 제외</div><div class="stat-value" style="color:#A32D2D">${excl.pattern||0}</div></div>
  </div>
  <div style="color:#aaa;font-size:13px;text-align:center;padding:40px 0">PRE 단계는 후보 종목 압축 단계입니다.<br>MID / FINAL에서 신호 종목을 확인하세요.</div>`;
}
function renderSignals(d,content){
  const excl=d.excluded||{};
  const signals=d.signals||{};
  const multiHit=d.multi_hit||[];
  let html=`<div class="section-meta">${d.collection||''}</div>
  <div class="stats">
    <div class="stat"><div class="stat-label">신호 종목</div><div class="stat-value">${d.total}</div></div>
    <div class="stat"><div class="stat-label">중복 신호</div><div class="stat-value" style="color:#534AB7">${multiHit.length}</div></div>
    <div class="stat"><div class="stat-label">월봉 제외</div><div class="stat-value" style="color:#A32D2D">${excl.monthly||0}</div></div>
    <div class="stat"><div class="stat-label">거래대금 제외</div><div class="stat-value" style="color:#A32D2D">${excl.volume||0}</div></div>
  </div>`;
  if(d.total===0){html+='<div class="empty">조건 충족 종목 없음</div>';content.innerHTML=html;return;}
  const shown=new Set();let cards='';
  multiHit.forEach(s=>{shown.add(s.ticker);cards+=makeCard(s,s.strategies.map(st=>st.replace('Strategy_','')),true);});
  Object.entries(signals).forEach(([st,sigs])=>{
    const stLabel=st.replace('Strategy_','');
    sigs.forEach(s=>{if(!shown.has(s.ticker)){shown.add(s.ticker);cards+=makeCard(s,[stLabel],false);}});
  });
  html+=`<div class="cards">${cards}</div>`;
  content.innerHTML=html;
}
function makeCard(s,strategies,isMulti){
  const naverUrl=`https://finance.naver.com/item/main.naver?code=${s.ticker}`;
  const badges=strategies.map(st=>`<span class="badge badge-${st}">${st}</span>`).join('')+(isMulti?'<span class="badge badge-multi">멀티</span>':'');
  return `<div class="card ${isMulti?'multi':''}">
    <div class="card-header">
      <div><div class="card-name">${s.name}</div><div class="card-ticker">${s.ticker}</div></div>
      <div class="badges">${badges}</div>
    </div>
    <div class="metrics">
      <div class="metric"><div class="metric-label">현재가</div><div class="metric-value">${s.curr}</div></div>
      <div class="metric"><div class="metric-label">목표가</div><div class="metric-value tp">${s.tp}</div></div>
      <div class="metric"><div class="metric-label">손절가</div><div class="metric-value sl">${s.sl}</div></div>
    </div>
    <div class="metric-rr">RR ${s.rr} · 거래대금 ${s.avg_vol_amt}억</div>
    <a class="chart-link" href="${naverUrl}" target="_blank">네이버 차트 보기 →</a>
  </div>`;
}
loadData();
</script>
</body>
</html>
