<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>QQQ 백테스트 신호 차트</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Malgun Gothic', sans-serif; background: #0f172a; color: #e2e8f0; }
  .header { background: #1e293b; padding: 20px 30px; border-bottom: 1px solid #334155; }
  .header h1 { font-size: 22px; color: #4fc3f7; }
  .header p { font-size: 12px; color: #94a3b8; margin-top: 4px; }
  .controls { display: flex; gap: 12px; padding: 16px 30px; background: #1e293b; flex-wrap: wrap; align-items: center; border-bottom: 1px solid #334155; }
  .controls label { font-size: 12px; color: #94a3b8; }
  select, input { background: #0f172a; color: #e2e8f0; border: 1px solid #334155; border-radius: 6px; padding: 6px 10px; font-size: 13px; }
  .btn { background: #1e40af; color: white; border: none; border-radius: 6px; padding: 7px 16px; cursor: pointer; font-size: 13px; }
  .btn:hover { background: #2563eb; }
  .btn.active { background: #0891b2; }
  .main { display: flex; height: calc(100vh - 140px); }
  .sidebar { width: 280px; min-width: 280px; background: #1e293b; overflow-y: auto; border-right: 1px solid #334155; }
  .sig-item { padding: 10px 14px; border-bottom: 1px solid #1e293b; cursor: pointer; transition: background 0.15s; }
  .sig-item:hover { background: #334155; }
  .sig-item.active { background: #1e40af; }
  .sig-item .top { display: flex; justify-content: space-between; align-items: center; }
  .sig-item .name { font-size: 13px; font-weight: bold; color: #e2e8f0; }
  .sig-item .badge { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: bold; }
  .badge-A { background: #1d4ed8; color: white; }
  .badge-B { background: #0e7490; color: white; }
  .badge-C { background: #7c3aed; color: white; }
  .badge-D { background: #065f46; color: white; }
  .sig-item .meta { font-size: 11px; color: #64748b; margin-top: 3px; }
  .sig-item .pnl { font-size: 12px; font-weight: bold; margin-top: 2px; }
  .pnl-pos { color: #34d399; }
  .pnl-neg { color: #f87171; }
  .chart-area { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .chart-info { background: #1e293b; border-radius: 10px; padding: 16px 20px; }
  .chart-info h2 { font-size: 16px; color: #e2e8f0; }
  .chart-info .meta-row { display: flex; gap: 20px; margin-top: 8px; flex-wrap: wrap; }
  .meta-chip { font-size: 11px; background: #0f172a; border-radius: 6px; padding: 4px 10px; color: #94a3b8; }
  .meta-chip span { color: #e2e8f0; font-weight: bold; }
  .result-chip { font-size: 12px; padding: 4px 12px; border-radius: 6px; font-weight: bold; }
  .result-TP { background: #064e3b; color: #34d399; }
  .result-SL { background: #450a0a; color: #f87171; }
  .result-HOLD { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
  .chart-wrap { background: #1e293b; border-radius: 10px; padding: 16px; flex: 1; min-height: 300px; position: relative; }
  .no-data { display: flex; align-items: center; justify-content: center; height: 100%; color: #64748b; font-size: 14px; }
  .stat-row { display: flex; gap: 12px; }
  .stat-box { background: #1e293b; border-radius: 10px; padding: 14px 18px; flex: 1; }
  .stat-box .label { font-size: 11px; color: #64748b; }
  .stat-box .val { font-size: 18px; font-weight: bold; margin-top: 4px; }
  .count-badge { background: #0f172a; border-radius: 12px; padding: 2px 8px; font-size: 11px; color: #64748b; margin-left: 6px; }
</style>
</head>
<body>
<div class="header">
  <h1>📊 QQQ 백테스트 · 신호 종목 주가 차트</h1>
  <p>backtest_v13 · 전략 A/B/C/D · 진입일 기준 이후 가격 흐름</p>
</div>
<div class="controls">
  <div>
    <label>전략 필터</label><br>
    <div style="display:flex;gap:6px;margin-top:4px">

      <button class="btn" onclick="filterStrategy('A')">A</button>
      <button class="btn" onclick="filterStrategy('B')">B</button>

  </div>
  <div>
    <label>국면 필터</label><br>

      <option value="Bull">Bull</option>
      <option value="Sideways">Sideways</option>
      <option value="Volatile">Volatile</option>
    </select>
  </div>
  <div>
    <label>결과 필터</label><br>

      <option value="SL">손절</option>
      <option value="HOLD">보유중</option>

  </div>
  <div>

  </div>
  <div style="margin-left:auto;text-align:right">
    <div style="font-size:11px;color:#64748b">표시 종목</div>
    <div id="countDisplay" style="font-size:16px;font-weight:bold;color:#4fc3f7">-</div>
  </div>
</div>
<div class="main">
  <div class="sidebar" id="sidebar"></div>
  <div class="chart-area">
    <div class="stat-row" id="statRow"></div>
    <div class="chart-info" id="chartInfo"><div class="no-data">← 왼쪽에서 종목을 선택하세요</div></div>
    <div class="chart-wrap"><canvas id="myChart"></canvas></div>
  </div>
</div>

let filtered = [...ALL_SIGNALS];
let currentStrat = 'ALL';
let chart = null;

function filterStrategy(s) {
  currentStrat = s;
  document.querySelectorAll('.controls .btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  applyFilter();
}

function applyFilter() {
  const regime = document.getElementById('regimeFilter').value;
  const result = document.getElementById('resultFilter').value;
  const search = document.getElementById('searchInput').value.toLowerCase();
  filtered = ALL_SIGNALS.filter(s => {
    if (currentStrat !== 'ALL' && s.strategy !== currentStrat) return false;
    if (regime !== 'ALL' && s.regime !== regime) return false;
    if (result !== 'ALL' && s.result !== result) return false;
    if (search && !s.name.toLowerCase().includes(search) && !s.ticker.includes(search)) return false;
    return true;
  });
  renderSidebar();
}

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  document.getElementById('countDisplay').textContent = filtered.length + '건';
  if (filtered.length === 0) {
    sb.innerHTML = '<div style="padding:20px;color:#64748b;font-size:13px">조건에 맞는 신호 없음</div>';
    return;
  }
  sb.innerHTML = filtered.map((s, i) => {
    const pnlClass = s.pnl >= 0 ? 'pnl-pos' : 'pnl-neg';
    const pnlStr = (s.pnl >= 0 ? '+' : '') + s.pnl.toFixed(2) + '%';
    return `<div class="sig-item" onclick="selectSignal(${i})" id="item-${i}">
      <div class="top">
        <span class="name">${s.name}</span>
        <span class="badge badge-${s.strategy}">전략${s.strategy}</span>
      </div>
      <div class="meta">${s.ticker} · ${s.entry_date} · ${s.regime}</div>
      <div class="pnl ${pnlClass}">${pnlStr} <span style="color:#64748b;font-size:10px">(${s.result})</span></div>
    </div>`;
  }).join('');
}

function selectSignal(idx) {
  document.querySelectorAll('.sig-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('item-' + idx);
  if (el) el.classList.add('active');

  const s = filtered[idx];
  const pnlClass = s.pnl >= 0 ? 'pnl-pos' : 'pnl-neg';
  const pnlStr = (s.pnl >= 0 ? '+' : '') + s.pnl.toFixed(2) + '%';
  const resultClass = s.result === 'TP' ? 'result-TP' : s.result === 'SL' ? 'result-SL' : 'result-HOLD';
  const resultLabel = s.result === 'TP' ? '✅ 익절' : s.result === 'SL' ? '❌ 손절' : '⏳ 보유';

  document.getElementById('chartInfo').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h2>${s.name} (${s.ticker})</h2>
      <span class="result-chip ${resultClass}">${resultLabel}</span>
    </div>
    <div class="meta-row">
      <div class="meta-chip">전략 <span>${s.strategy}</span></div>
      <div class="meta-chip">진입일 <span>${s.entry_date}</span></div>
      <div class="meta-chip">진입가 <span>${s.entry_price.toLocaleString()}원</span></div>
      <div class="meta-chip">국면 <span>${s.regime}</span></div>
      <div class="meta-chip">손절가 <span>${s.sl ? s.sl.toLocaleString() + '원 (' + s.sl_pct + '%)' : 'N/A'}</span></div>
      <div class="meta-chip">TP3% <span>${s.tp3_pct}%</span></div>
      <div class="meta-chip ${pnlClass}">손익 <span>${pnlStr}</span></div>
    </div>`;

  // 차트 그리기
  const prices = s.prices;
  const labels = prices.map((_, i) => i + '봉');
  const pnlSeries = s.pnl_series;

  // 색상: 수익률 기준
  const borderColor = s.pnl >= 0 ? '#34d399' : '#f87171';

  if (chart) chart.destroy();
  const ctx = document.getElementById('myChart').getContext('2d');

  // 진입가, TP, SL 라인
  const entryLine = Array(prices.length).fill(0);
  const tp3Line   = Array(prices.length).fill(s.tp3_pct);
  const slLine    = s.sl_pct ? Array(prices.length).fill(s.sl_pct) : null;

  const datasets = [
    {
      label: '수익률(%)',
      data: pnlSeries,
      borderColor: borderColor,
      backgroundColor: borderColor + '22',
      borderWidth: 2,
      pointRadius: 0,
      fill: true,
      tension: 0.1,
    },
    {
      label: '진입',
      data: entryLine,
      borderColor: '#94a3b8',
      borderWidth: 1,
      borderDash: [4,4],
      pointRadius: 0,
      fill: false,
    },
    {
      label: 'TP +3%',
      data: tp3Line,
      borderColor: '#34d399',
      borderWidth: 1,
      borderDash: [4,4],
      pointRadius: 0,
      fill: false,
    },
  ];

  if (slLine) {
    datasets.push({
      label: '손절',
      data: slLine,
      borderColor: '#f87171',
      borderWidth: 1,
      borderDash: [4,4],
      pointRadius: 0,
      fill: false,
    });
  }

  // 청산 포인트 표시
  if (s.exit_bar < prices.length) {
    const exitData = Array(prices.length).fill(null);
    exitData[s.exit_bar] = pnlSeries[s.exit_bar];
    datasets.push({
      label: '청산',
      data: exitData,
      borderColor: s.result === 'TP' ? '#34d399' : '#f87171',
      backgroundColor: s.result === 'TP' ? '#34d399' : '#f87171',
      pointRadius: 8,
      pointStyle: 'star',
      showLine: false,
    });
  }

  chart = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#94a3b8', font: { size: 11 } } },
        tooltip: {
          callbacks: {
            label: ctx => ctx.dataset.label + ': ' + (ctx.raw !== null ? ctx.raw.toFixed(2) + '%' : 'N/A')
          }
        }
      },
      scales: {
        x: { ticks: { color: '#64748b', maxTicksLimit: 20 }, grid: { color: '#1e293b' } },
        y: {
          ticks: { color: '#64748b', callback: v => v.toFixed(1) + '%' },
          grid: { color: '#334155' },
        }
      }
    }
  });
}

// 초기 통계
function renderStats() {
  const wins = ALL_SIGNALS.filter(s => s.pnl > 0).length;
  const wr = (wins / ALL_SIGNALS.length * 100).toFixed(1);
  const avgPnl = (ALL_SIGNALS.reduce((a,s) => a + s.pnl, 0) / ALL_SIGNALS.length).toFixed(2);
  const tpCnt = ALL_SIGNALS.filter(s => s.result === 'TP').length;
  const slCnt = ALL_SIGNALS.filter(s => s.result === 'SL').length;
  document.getElementById('statRow').innerHTML = `
    <div class="stat-box"><div class="label">총 신호수</div><div class="val" style="color:#4fc3f7">${ALL_SIGNALS.length}건</div></div>
    <div class="stat-box"><div class="label">승률</div><div class="val" style="color:#34d399">${wr}%</div></div>
    <div class="stat-box"><div class="label">평균수익</div><div class="val" style="color:${avgPnl>=0?'#34d399':'#f87171'}">${avgPnl>=0?'+':''}${avgPnl}%</div></div>
    <div class="stat-box"><div class="label">익절/손절</div><div class="val" style="color:#e2e8f0">${tpCnt}건 / ${slCnt}건</div></div>
  `;
}

renderStats();
applyFilter();
</script>
